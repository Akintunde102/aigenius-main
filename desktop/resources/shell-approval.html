<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline'" />
    <title>Local terminal</title>
    <style>
      :root {
        --bg: #0f1114;
        --surface: #161a20;
        --surface-hover: #1c2129;
        --border: rgba(148, 163, 184, 0.12);
        --border-strong: rgba(148, 163, 184, 0.2);
        --text: #e8eaef;
        --muted: #94a3b8;
        --dim: #64748b;
        --accent: #38bdf8;
        --accent-dim: rgba(56, 189, 248, 0.14);
        --accent-border: rgba(56, 189, 248, 0.45);
        --radius: 12px;
        --radius-sm: 8px;
        --font: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        --mono: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: var(--font);
        font-size: 14px;
        line-height: 1.45;
        color: var(--text);
        background: var(--bg);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }

      .chrome {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        padding: 0;
      }

      /* Draggable strip under Window Controls Overlay (Windows/Linux); 0px on macOS inset title bar. */
      #titlebar-drag {
        height: env(titlebar-area-height, 0px);
        width: 100%;
        -webkit-app-region: drag;
        flex-shrink: 0;
        background: var(--bg);
      }

      .content-scroll {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 14px 22px 12px;
      }

      .meta {
        font-size: 11px;
        color: var(--dim);
        margin: 0 0 10px;
        line-height: 1.45;
      }

      .meta strong {
        color: var(--muted);
        font-weight: 600;
      }

      .command-wrap {
        min-height: 80px;
        margin: 0 -2px;
        padding: 0 2px 4px;
        border-radius: var(--radius);
      }

      .content-scroll::-webkit-scrollbar,
      .command-wrap::-webkit-scrollbar {
        width: 8px;
      }
      .content-scroll::-webkit-scrollbar-thumb,
      .command-wrap::-webkit-scrollbar-thumb {
        background: rgba(148, 163, 184, 0.25);
        border-radius: 4px;
      }

      .command-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 12px 14px;
        transition: border-color 0.15s ease, background 0.15s ease;
      }

      .command-panel:hover {
        background: var(--surface-hover);
        border-color: var(--border-strong);
      }

      pre.command {
        margin: 0;
        font-family: var(--mono);
        font-size: 12px;
        line-height: 1.5;
        color: var(--text);
        white-space: pre-wrap;
        word-break: break-word;
      }

      .footer {
        flex-shrink: 0;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
        padding: 14px 22px 18px;
        border-top: 1px solid var(--border);
        background: var(--bg);
        box-shadow: 0 -12px 24px rgba(0, 0, 0, 0.35);
      }

      button {
        font-family: inherit;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        border-radius: 9px;
        padding: 9px 16px;
        border: 1px solid transparent;
        -webkit-app-region: no-drag;
        transition:
          background 0.15s ease,
          border-color 0.15s ease,
          color 0.15s ease;
      }

      button:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .btn-cancel {
        background: transparent;
        color: var(--muted);
        border-color: var(--border);
      }
      .btn-cancel:hover {
        background: var(--surface);
        color: var(--text);
        border-color: var(--border-strong);
      }

      .btn-run {
        background: var(--accent-dim);
        color: var(--accent);
        border-color: var(--accent-border);
        box-shadow: 0 0 20px rgba(56, 189, 248, 0.08);
      }
      .btn-run:hover {
        background: rgba(56, 189, 248, 0.22);
        color: #7dd3fc;
        border-color: rgba(56, 189, 248, 0.55);
      }
    </style>
  </head>
  <body>
    <div class="chrome">
      <div id="titlebar-drag" aria-hidden="true"></div>
      <div class="content-scroll">
        <p class="meta" id="meta"></p>
        <div class="command-wrap">
          <div class="command-panel">
            <pre class="command" id="command"></pre>
          </div>
        </div>
      </div>
      <div class="footer">
        <button type="button" class="btn-cancel" id="btn-cancel">Cancel</button>
        <button type="button" class="btn-run" id="btn-run">Run</button>
      </div>
    </div>
    <script>
      const api = window.aigeniusShellApproval;
      if (!api) {
        document.getElementById('meta').textContent = 'UI failed to load.';
        throw new Error('aigeniusShellApproval missing');
      }

      function esc(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      function render(data) {
        document.getElementById('command').textContent = data.command;
        document.getElementById('meta').innerHTML =
          '<strong>Dir</strong> ' +
          esc(data.cwdDisplay) +
          ' · <strong>Limit</strong> ' +
          esc(data.timeoutLabel);
      }

      api.bootstrap(function (data) {
        render(data);
      });

      document.getElementById('btn-cancel').addEventListener('click', function () {
        api.done(false);
      });
      document.getElementById('btn-run').addEventListener('click', function () {
        api.done(true);
      });
    </script>
  </body>
</html>
